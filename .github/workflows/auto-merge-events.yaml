# Auto-merge PRs that ONLY ADD event files (confirmations/flags).
#
# Rationale: confirm/flag must stay cheap (no human in the loop), while
# proposing new knowledge stays expensive (CODEOWNERS review). Validation CI
# is the only gate for events.
#
# Requirements:
#   - "Allow auto-merge" enabled in repo settings.
#   - Branch protection requiring the "Schema & integrity" check, so
#     auto-merge only completes after validation passes.
#
# Scope guard: runs only for same-repo branches (not forks). Fork PRs from
# unknown contributors fall back to normal review.
#
# NOTE: pin actions to commit SHAs before production use.
name: Auto-merge event PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    name: Event-only PR gate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check the diff only adds files under events/
        id: check
        run: |
          BASE="origin/${{ github.base_ref }}"
          # Any change that is not an Addition, or any file outside events/,
          # disqualifies the PR from auto-merge.
          NON_EVENT=$(git diff --name-status "$BASE"...HEAD \
            | awk '$1 != "A" || $2 !~ /^events\// { print }')
          if [ -z "$NON_EVENT" ]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Not event-only; requires normal review:"
            echo "$NON_EVENT"
          fi
      - name: Approve and enable auto-merge
        if: steps.check.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --approve \
            --body "Event-only PR: auto-approved; merges when validation passes."
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --auto --squash
